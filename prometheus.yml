global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'kg-system'
    static_configs:
      - targets: ['kg-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'kg-system-internal'
    static_configs:
      - targets: ['kg-api:8001']
    metrics_path: '/internal/metrics'
    scrape_interval: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - "alert_rules.yml"
