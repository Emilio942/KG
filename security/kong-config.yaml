
_format_version: "3.0"

services:
- name: kg-system-enterprise-api
  url: http://kg-system-enterprise-service:80
  plugins:
  - name: rate-limiting-advanced
    config:
      limit:
        - 1000
      window_size:
        - 60
      identifier: consumer
      sync_rate: 10
      strategy: cluster
      hide_client_headers: false
      header_name: X-RateLimit-Limit
      
  - name: jwt
    config:
      secret_is_base64: false
      key_claim_name: iss
      claims_to_verify:
        - exp
        - iss
      uri_param_names:
        - jwt
      header_names:
        - authorization
      
  - name: cors
    config:
      origins:
        - "https://app.kg-system.com"
        - "https://dashboard.kg-system.com"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - X-Auth-Token
        - X-Tenant-ID
      exposed_headers:
        - X-Auth-Token
        - X-RateLimit-Limit
        - X-RateLimit-Remaining
      credentials: true
      max_age: 3600
      
  - name: request-validator
    config:
      allowed_content_types:
        - application/json
        - application/x-www-form-urlencoded
        - multipart/form-data
      body_schema: |
        {
          "type": "object",
          "properties": {
            "hypothesis": {
              "type": "object",
              "required": ["input", "mode"],
              "properties": {
                "input": {"type": "string", "maxLength": 10000},
                "mode": {"type": "string", "enum": ["high_performance_enterprise"]},
                "tenant_id": {"type": "string", "pattern": "^[a-zA-Z0-9_-]+$"}
              }
            }
          }
        }
        
  - name: response-transformer
    config:
      add:
        headers:
          - "X-Sweet-Spot-Mode:high_performance_enterprise"
          - "X-Performance-Target:0.70s"
          - "X-Enterprise-Ready:true"

routes:
- name: kg-system-api-route
  service: kg-system-enterprise-api
  hosts:
    - api.kg-system.com
  paths:
    - /api/v1
  methods:
    - GET
    - POST
    - PUT
    - DELETE
  strip_path: true
  preserve_host: true
  
consumers:
- username: enterprise-tenant-001
  custom_id: tenant_001
  tags:
    - enterprise
    - sweet-spot-user
    
- username: enterprise-tenant-002  
  custom_id: tenant_002
  tags:
    - enterprise
    - sweet-spot-user

plugins:
- name: prometheus
  config:
    per_consumer: true
    status_code_metrics: true
    latency_metrics: true
    bandwidth_metrics: true
    upstream_health_metrics: true

- name: datadog
  config:
    host: datadog-agent
    port: 8125
    metrics:
      - name: kong.request.count
        stat_type: counter
        tags:
          - sweet_spot:high_performance_enterprise
      - name: kong.latency
        stat_type: histogram
        tags:
          - performance_target:0.70s
